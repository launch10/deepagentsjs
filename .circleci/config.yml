version: 2.1

orbs:
  node: circleci/node@5.2.0
  ruby: circleci/ruby@2.1.0

# Shared environment configuration
rails-env: &rails-env
  LANGGRAPH_API_URL: http://localhost:8080
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/launch10_test
  REDIS_URL: redis://localhost:6379
  RAILS_ENV: test
  CI: true

langgraph-env: &langgraph-env
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/launch10_test
  REDIS_URL: redis://localhost:6379
  NODE_ENV: test
  USE_CACHE: false
  CI: true
  LLM_COST: paid # Use paid tier to avoid Ollama dependency in tests

commands:
  setup-database:
    steps:
      - run:
          name: Wait for Postgres
          command: dockerize -wait tcp://localhost:5432 -timeout 1m
      - run:
          name: Wait for Redis
          command: dockerize -wait tcp://localhost:6379 -timeout 1m
      - run:
          name: Setup Rails database
          command: |
            cd ~/project/rails_app
            RAILS_MASTER_KEY=$(cat config/credentials/test.key) bundle exec rake db:create db:schema:load
          environment:
            <<: *rails-env

jobs:
  langgraph-tests:
    docker:
      - image: cimg/node:22.12.0
      - image: pgvector/pgvector:pg16
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: launch10_test
      - image: cimg/redis:7.2
    working_directory: ~/project/langgraph_app
    environment:
      <<: *langgraph-env
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install Git LFS and pull files
          command: |
            curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
            sudo apt-get update
            sudo apt-get install -y git-lfs
            git lfs install
            cd ~/project
            git lfs pull
      - run:
          name: Install Ruby in primary container
          command: |
            gpg --keyserver hkp://keyserver.ubuntu.com --recv-keys 409B6B1796C275462A1703113804BB82D39DC0E3 7D2BAF1CF37B13E2069D6956105BD0E739499BDB
            curl -sSL https://get.rvm.io | bash -s stable
            source ~/.rvm/scripts/rvm
            rvm install 3.4.4
            rvm use 3.4.4 --default
            echo 'source ~/.rvm/scripts/rvm' >> $BASH_ENV
      - run:
          name: Install PostgreSQL 16 client
          command: |
            # Add PostgreSQL APT repository to get version 16
            sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
            sudo apt-get update
            sudo apt-get install -y postgresql-client-16
      - run:
          name: Install pnpm
          command: |
            curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=9.15.0 SHELL=/bin/bash sh -
            echo 'export PNPM_HOME="$HOME/.local/share/pnpm"' >> $BASH_ENV
            echo 'export PATH="$PNPM_HOME:$PATH"' >> $BASH_ENV
            source $BASH_ENV
      - restore_cache:
          keys:
            - rails-gems-v1-{{ checksum "../rails_app/Gemfile.lock" }}
            - rails-gems-v1-
      - restore_cache:
          keys:
            - langgraph-deps-v1-{{ checksum "pnpm-lock.yaml" }}
            - langgraph-deps-v1-
      - run:
          name: Install langgraph dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: langgraph-deps-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - node_modules
            - ~/.pnpm-store
      - run:
          name: Run typecheck
          command: pnpm run typecheck
      - run:
          name: Run lint
          command: pnpm run lint
      - run:
          name: Install Rails dependencies
          command: |
            cd ~/project/rails_app
            bundle install
      - save_cache:
          key: rails-gems-v1-{{ checksum "../rails_app/Gemfile.lock" }}
          paths:
            - ~/project/rails_app/vendor/bundle
      - setup-database
      - run:
          name: Install Rails frontend dependencies
          command: |
            cd ~/project/rails_app
            pnpm install
      - run:
          name: Precompile assets
          command: |
            cd ~/project/rails_app
            RAILS_MASTER_KEY=$(cat config/credentials/test.key) bundle exec rake assets:precompile
          environment:
            <<: *rails-env
      - run:
          name: Start Rails test server
          command: |
            cd ~/project/rails_app
            RAILS_MASTER_KEY=$(cat config/credentials/test.key) bundle exec rails server -e test -p 3000 2>&1 | tee ~/rails_server.log
          background: true
          environment:
            <<: *rails-env
      - run:
          name: Wait for Rails server
          command: |
            sleep 5
            cat ~/rails_server.log
            npx wait-on http://localhost:3000 -t 30000 --verbose
      - run:
          name: Run tests
          command: pnpm run test
          environment:
            <<: *langgraph-env

  rails-tests:
    docker:
      - image: cimg/ruby:3.4.4-node
      - image: pgvector/pgvector:pg16
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: launch10_test
          LANGGRAPH_API_URL: http://localhost:8080
      - image: cimg/redis:7.2
    working_directory: ~/project/rails_app
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install PostgreSQL 16 client
          command: |
            # Add PostgreSQL APT repository to get version 16
            sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
            sudo apt-get update
            sudo apt-get install -y postgresql-client-16
      - ruby/install-deps:
          key: rails-gems-v1
      - setup-database
      - run:
          name: Install pnpm
          command: |
            curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=9.15.0 SHELL=/bin/bash sh -
            echo 'export PNPM_HOME="$HOME/.local/share/pnpm"' >> $BASH_ENV
            echo 'export PATH="$PNPM_HOME:$PATH"' >> $BASH_ENV
            source $BASH_ENV
      - run:
          name: Install frontend dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Build Tailwind CSS
          command: RAILS_MASTER_KEY=$(cat config/credentials/test.key) bundle exec rake assets:precompile
          environment:
            <<: *rails-env
      - run:
          name: Run RSpec tests
          command: RAILS_MASTER_KEY=$(cat config/credentials/test.key) bundle exec rspec
          environment:
            <<: *rails-env

workflows:
  version: 2
  test:
    jobs:
      - langgraph-tests
      - rails-tests
