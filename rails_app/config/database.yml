default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: postgres
  password: postgres

# Auto-detect instance from directory name (launch1-4 use separate DBs)
<% db_prefix = ENV.fetch("DB_PREFIX") { File.basename(File.expand_path("../..", __dir__)) =~ /\Alaunch([1-4])\z/ ? "launch#{$1}" : "launch10" } %>

development:
  <<: *default
  database: <%= db_prefix %>_development

test:
  <<: *default
  database: <%= db_prefix %>_test

staging:
  <<: *default
  database: launch10_staging
  username: jumpstart
  password: <%= ENV["POSTGRES_PASSWORD"] %>

production:
  <<: *default
  database: launch10_production
  username: launch10
  password: <%= ENV["POSTGRES_PASSWORD"] %>
