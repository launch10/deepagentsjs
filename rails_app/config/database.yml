default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: postgres
  password: postgres

development:
  <<: *default
  database: launch10_development

test:
  <<: *default
  database: launch10_test

staging:
  <<: *default
  database: launch10_staging
  username: jumpstart
  password: <%= ENV["POSTGRES_PASSWORD"] %>

production:
  <<: *default
  database: launch10_production
  username: launch10
  password: <%= ENV["POSTGRES_PASSWORD"] %>
