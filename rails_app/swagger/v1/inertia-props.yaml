                  - error
                  - info
              message:
                type: string
            required:
              - type
              - message
          description: Flash messages
        captcha_field_name:
          type: string
        minimum_password_length:
          type: integer
        spinner:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          nullable: true
      required:
        - csrf_token
        - captcha_field_name
        - minimum_password_length
        - spinner
