components:
  schemas:
    SignInProps:
      type: object
      additionalProperties: false
      properties:
        csrf_token:
          type: string
          description: CSRF token
        google_oauth_path:
          type: string
          description: Google OAuth path (null if OAuth disabled)
          nullable: true
        flash:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - success
                  - error
                  - info
              message:
                type: string
            required:
              - type
              - message
          description: Flash messages
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          nullable: true
      required:
        - csrf_token
    SignUpProps:
      type: object
      additionalProperties: false
