        jwt:
          type: string
          description: JWT token for API authentication
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Validation errors from session
        flash:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - success
                  - error
                  - info
              message:
                type: string
            required:
              - type
              - message
          description: Flash messages
        current_user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
          required:
            - id
            - name
            - email
          nullable: true
          description: Currently authenticated user
        true_user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
          required:
            - id
            - name
            - email
          nullable: true
          description: Original admin user when impersonating
        impersonating:
          type: boolean
          description: Whether admin is currently impersonating another user
        credits:
          type: object
          properties:
            plan_credits:
              type: number
            pack_credits:
              type: number
            total_credits:
              type: number
            plan_credits_allocated:
              type: number
            period_ends_at:
              type: string
              nullable: true
          required:
            - plan_credits
            - pack_credits
            - total_credits
            - plan_credits_allocated
          nullable: true
          description: Credit balance for the current account
        thread_id:
          type: "null"
          description: Langgraph thread ID for the conversation
        project:
          type: object
          additionalProperties: false
          properties:
            uuid:
              type: "null"
              description: Project UUID
          nullable: true
      required:
        - root_path
