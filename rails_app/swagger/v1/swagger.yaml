---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/test/database/truncate":
    post:
      summary: Truncates the database
      tags:
      - Test Database
      description: Truncates all tables in the database. Only available in development/test
        environments.
      responses:
        '200':
          description: database truncated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '500':
          description: internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
  "/test/database/snapshots":
    get:
      summary: Lists available database snapshots
      tags:
      - Test Database
      description: Returns a list of all available database snapshot names. Only available
        in development/test environments.
      responses:
        '200':
          description: snapshots listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: string
                    description: Array of snapshot names (without .sql extension)
                required:
                - snapshots
    post:
      summary: Creates a database snapshot
      tags:
      - Test Database
      description: Creates a new database snapshot with the specified name. Only available
        in development/test environments.
      parameters: []
      responses:
        '201':
          description: snapshot created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
  "/test/database/restore_snapshot":
    post:
      summary: Restores a database snapshot
      tags:
      - Test Database
      description: Restores the database from a snapshot. Optionally truncates the
        database before restoring. Only available in development/test environments.
      parameters: []
      responses:
        '200':
          description: snapshot restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
  "/themes":
    get:
      summary: Lists all themes
      tags:
      - Themes
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: returns empty array when no themes exist
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Unique identifier
                    name:
                      type: string
                      description: Theme name
                    colors:
                      type: array
                      items:
                        type: string
                      description: Theme color palette
                    theme_labels:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: Unique identifier
                          name:
                            type: string
                            description: Label name
                        required:
                        - id
                        - name
                      description: Associated theme labels
                  required:
                  - id
                  - name
                  - colors
                  - theme_labels
        '401':
          description: unauthorized - invalid token
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
