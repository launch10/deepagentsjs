          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: creates website_file from template_file when file not yet customized
          content:
            application/json:
              schema:
                type: object
