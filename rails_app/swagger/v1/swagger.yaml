          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
