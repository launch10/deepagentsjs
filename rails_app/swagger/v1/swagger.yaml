---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/brainstorms":
    post:
      summary: Creates a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: brainstorm created in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '401':
          description: unauthorized - missing token
        '422':
          description: invalid request - missing thread_id
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                brainstorm:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Optional name for the brainstorm. Defaults to MM/DD/YYYY
                        HH:MM:SS
                    thread_id:
                      type: string
                      description: Required thread ID from Langgraph
                    idea:
                      type: string
                      description: The core idea for the landing page
                    audience:
                      type: string
                      description: Target audience for the landing page
                    solution:
                      type: string
                      description: The solution being offered
                    social_proof:
                      type: string
                      description: Social proof elements
                    look_and_feel:
                      type: string
                      description: Design preferences
                    project_attributes:
                      type: object
                      properties:
                        uuid:
                          type: string
                          description: Optional UUID for the project
              required:
              - brainstorm
  "/api/v1/brainstorms/{thread_id}":
    parameters:
    - name: thread_id
      in: path
      description: Thread ID from Langgraph
      required: true
      schema:
        type: string
    get:
      summary: Retrieves a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: brainstorm found in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
    patch:
      summary: Updates a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: brainstorm updated in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                brainstorm:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Optional name for the brainstorm. Defaults to MM/DD/YYYY
                        HH:MM:SS
                    thread_id:
                      type: string
                      description: Required thread ID from Langgraph
                    idea:
                      type: string
                      description: The core idea for the landing page
                    audience:
                      type: string
                      description: Target audience for the landing page
                    solution:
                      type: string
                      description: The solution being offered
                    social_proof:
                      type: string
                      description: Social proof elements
                    look_and_feel:
                      type: string
                      description: Design preferences
                    project_attributes:
                      type: object
                      properties:
                        uuid:
                          type: string
                          description: Optional UUID for the project
              required:
              - brainstorm
  "/test/database/truncate":
    post:
      summary: Truncates the database
      tags:
      - Test Database
      description: Truncates all tables in the database. Only available in development/test
        environments.
      responses:
        '200':
          description: database truncated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '500':
          description: internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
  "/test/database/snapshots":
    get:
      summary: Lists available database snapshots
      tags:
      - Test Database
      description: Returns a list of all available database snapshot names. Only available
        in development/test environments.
      responses:
        '200':
          description: snapshots listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: string
                    description: Array of snapshot names (without .sql extension)
                required:
                - snapshots
    post:
      summary: Creates a database snapshot
      tags:
      - Test Database
      description: Creates a new database snapshot with the specified name. Only available
        in development/test environments.
      parameters: []
      responses:
        '201':
          description: snapshot created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
  "/test/database/restore_snapshot":
    post:
      summary: Restores a database snapshot
      tags:
      - Test Database
      description: Restores the database from a snapshot. Optionally truncates the
        database before restoring. Only available in development/test environments.
      parameters: []
      responses:
        '200':
          description: snapshot restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
  "/api/v1/themes":
    get:
      summary: Lists official themes + themes in account
      tags:
      - Themes
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: retrieves official + account themes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Unique identifier
                    name:
                      type: string
                      description: Theme name
                    colors:
                      type: array
                      items:
                        type: string
                      description: Theme color palette
                    theme_labels:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: Unique identifier
                          name:
                            type: string
                            description: Label name
                        required:
                        - id
                        - name
                      description: Associated theme labels
                  required:
                  - id
                  - name
                  - colors
                  - theme_labels
        '401':
          description: unauthorized - invalid token
    post:
      summary: Creates theme
      tags:
      - Themes
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: theme created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Theme name
                  colors:
                    type: array
                    items:
                      type: string
                    description: Theme color palette
                  theme_labels:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        name:
                          type: string
                          description: Label name
                      required:
                      - id
                      - name
                    description: Associated theme labels
                required:
                - id
                - name
                - colors
                - theme_labels
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
                  errors:
                    type: array
                    items:
                      type: string
                    description: Array of error messages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Theme name
                colors:
                  type: array
                  items:
                    type: string
                  description: Theme color palette
              required:
              - name
              - colors
  "/api/v1/uploads":
    post:
      summary: Creates an upload
      tags:
      - Uploads
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: creating upload without website
        '422':
          description: rejects PDF upload
        '401':
          description: unauthorized - missing token
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
    get:
      summary: Retrieves uploads
      tags:
      - Uploads
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      - name: website_id
        in: query
        required: false
        description: Filter by website
        schema:
          type: integer
      responses:
        '200':
          description: returns team account uploads after switching
        '404':
          description: website not found when filtering
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
