        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: brainstorm found in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
    patch:
      summary: Updates a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: brainstorm updated in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                brainstorm:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Optional name for the brainstorm. Defaults to MM/DD/YYYY
                        HH:MM:SS
                    thread_id:
                      type: string
                      description: Required thread ID from Langgraph
                    idea:
                      type: string
                      description: The core idea for the landing page
                    audience:
                      type: string
                      description: Target audience for the landing page
                    solution:
                      type: string
                      description: The solution being offered
                    social_proof:
                      type: string
                      description: Social proof elements
                    look_and_feel:
                      type: string
                      description: Design preferences
                    project_attributes:
                      type: object
                      properties:
                        uuid:
                          type: string
                          description: Optional UUID for the project
              required:
              - brainstorm
  "/api/v1/campaigns":
    post:
      summary: Creates a campaign
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: campaign created with ad group and ad
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '200':
          description: campaign already exists and is returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '401':
          description: unauthorized - missing token
        '422':
          description: invalid request - missing website_id
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Campaign name
                    project_id:
                      type: integer
                      description: Project ID
                    website_id:
                      type: integer
                      description: Website ID
                  required:
                  - project_id
                  - website_id
              required:
              - campaign
  "/api/v1/campaigns/{id}":
    parameters:
    - name: id
      in: path
      description: Campaign ID
      required: true
      schema:
        type: integer
    patch:
      summary: Updates a campaign (autosave)
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ready_for_next_stage is true after all launch fields are configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '404':
          description: campaign not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Campaign name
                    start_date:
                      type: string
                      format: date
                      description: Campaign start date
                    end_date:
                      type: string
                      format: date
                      description: Campaign end date
                    time_zone:
                      type: string
                      description: Campaign time zone
                    daily_budget_cents:
                      type: integer
                      description: Daily budget in cents
                    google_advertising_channel_type:
                      type: string
                      description: Google Ads channel type
                    google_bidding_strategy:
                      type: string
                      description: Google Ads bidding strategy
                    ad_groups_attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          _destroy:
                            type: boolean
                          ads_attributes:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                _destroy:
                                  type: boolean
                                headlines_attributes:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: integer
                                      text:
                                        type: string
                                      _destroy:
                                        type: boolean
                                descriptions_attributes:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: integer
                                      text:
                                        type: string
                                      _destroy:
                                        type: boolean
                          keywords_attributes:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                text:
                                  type: string
                                match_type:
                                  type: string
                                _destroy:
                                  type: boolean
                    callouts_attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          text:
                            type: string
                          _destroy:
                            type: boolean
                    structured_snippet_attributes:
                      type: object
                      properties:
                        id:
                          type: integer
                        header:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
                    location_targets:
                      type: array
                      items:
                        type: object
                        properties:
                          target_type:
                            type: string
                          location_name:
                            type: string
                          location_type:
                            type: string
                          country_code:
                            type: string
                          geo_target_constant:
                            type: string
                          targeted:
                            type: boolean
                          radius:
                            type: number
                          radius_units:
                            type: string
                    ad_schedules:
                      type: object
                      properties:
                        time_zone:
                          type: string
                        always_on:
                          type: boolean
                        schedules:
                          type: array
              required:
              - campaign
  "/api/v1/campaigns/{id}/advance":
    parameters:
    - name: id
      in: path
      description: Campaign ID
      required: true
      schema:
        type: integer
    post:
      summary: Advances campaign to next stage
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '404':
          description: campaign not found
        '200':
          description: campaign advanced from launch to review stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  stage:
                    type: string
                    description: New campaign stage after advancement
                  status:
                    type: string
                    description: Campaign status
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
        '422':
          description: cannot advance from launch - validation failed (missing fields)
  "/api/v1/campaigns/{id}/back":
    parameters:
    - name: id
      in: path
      description: Campaign ID
      required: true
      schema:
        type: integer
    post:
      summary: Steps back to previous stage
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: campaign stepped back to previous stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  stage:
                    type: string
                    description: New campaign stage after advancement
                  status:
                    type: string
                    description: Campaign status
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
        '404':
          description: campaign not found
  "/api/v1/projects/{project_uuid}/workflows/{id}":
    parameters:
    - name: project_uuid
      in: path
      description: Project UUID
      required: true
      schema:
        type: string
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
    patch:
      summary: Updates a project workflow
      tags:
      - Project Workflows
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: workflow advanced in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_type:
                    type: string
                    description: Type of workflow
                  step:
                    type: string
                    description: Current step in the workflow
                  substep:
                    type: string
                    nullable: true
                    description: Current substep in the workflow
                  progress:
                    type: number
                    description: Progress percentage (0-100)
                  available_steps:
                    type: array
                    items:
                      type: string
                    description: List of available steps in this workflow
                required:
                - workflow_type
                - step
                - progress
                - available_steps
        '404':
          description: project not found
        '422':
          description: missing step parameter
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                project_workflow:
                  type: object
                  properties:
                    step:
                      type: string
                      description: Step to advance to
                    substep:
                      type: string
                      description: Optional substep to advance to
                  required:
                  - step
              required:
              - project_workflow
  "/api/v1/projects/{project_uuid}/workflows/{id}/next":
    parameters:
    - name: project_uuid
      in: path
      description: Project UUID
      required: true
      schema:
        type: string
    - name: id
      in: path
      description: Workflow ID
      required: true
      schema:
        type: string
    patch:
      summary: Advances workflow to next step
      tags:
      - Project Workflows
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: workflow advanced to next step with substep
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_type:
                    type: string
                    description: Type of workflow
                  step:
                    type: string
                    description: Current step in the workflow
                  substep:
                    type: string
                    nullable: true
                    description: Current substep in the workflow
                  progress:
                    type: number
                    description: Progress percentage (0-100)
                  available_steps:
                    type: array
                    items:
                      type: string
                    description: List of available steps in this workflow
                required:
                - workflow_type
                - step
                - progress
                - available_steps
        '422':
          description: already at final step
        '404':
          description: workflow not found
  "/test/database/truncate":
    post:
      summary: Truncates the database
      tags:
      - Test Database
      description: Truncates all tables in the database. Only available in development/test
        environments.
      responses:
        '200':
          description: database truncated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '500':
          description: internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
  "/test/database/snapshots":
    get:
      summary: Lists available database snapshots
      tags:
      - Test Database
      description: Returns a list of all available database snapshot names. Only available
        in development/test environments.
      responses:
        '200':
          description: snapshots listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: string
                    description: Array of snapshot names (without .sql extension)
                required:
                - snapshots
    post:
      summary: Creates a database snapshot
      tags:
      - Test Database
      description: Creates a new database snapshot with the specified name. Only available
        in development/test environments.
      parameters: []
      responses:
        '201':
          description: snapshot created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
                  required:
                  - name
              required:
              - snapshot
  "/test/database/restore_snapshot":
    post:
      summary: Restores a database snapshot
      tags:
      - Test Database
      description: Restores the database from a snapshot. Optionally truncates the
        database before restoring. Only available in development/test environments.
      parameters: []
      responses:
        '200':
          description: snapshot restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Operation completed successfully
                required:
                - status
                - message
        '422':
          description: missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  errors:
                    type: array
                    items:
                      type: string
                      example: 'Failed to perform operation: error details'
                required:
                - status
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                snapshot:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Name for the snapshot (without .sql extension)
                    truncate_first:
                      type: boolean
                      description: Whether to truncate the database before restoring
                      default: false
