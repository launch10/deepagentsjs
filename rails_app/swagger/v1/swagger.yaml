---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/brainstorms":
    post:
      summary: Creates a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: brainstorm created in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '401':
          description: unauthorized - missing token
        '422':
          description: invalid request - missing thread_id
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                brainstorm:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Optional name for the brainstorm. Defaults to MM/DD/YYYY
                        HH:MM:SS
                    thread_id:
                      type: string
                      description: Required thread ID from Langgraph
                    idea:
                      type: string
                      description: The core idea for the landing page
                    audience:
                      type: string
                      description: Target audience for the landing page
                    solution:
                      type: string
                      description: The solution being offered
                    social_proof:
                      type: string
                      description: Social proof elements
                    look_and_feel:
                      type: string
                      description: Design preferences
                    project_attributes:
                      type: object
                      properties:
                        uuid:
                          type: string
                          description: Optional UUID for the project
              required:
              - brainstorm
  "/api/v1/brainstorms/{thread_id}":
    parameters:
    - name: thread_id
      in: path
      description: Thread ID from Langgraph
      required: true
      schema:
        type: string
