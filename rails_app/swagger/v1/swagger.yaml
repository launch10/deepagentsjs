          description: Limit number of results
          schema:
            type: integer
      responses:
        "200":
          description: returns uploads with order=recent and limit combined
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Unique identifier
                    uuid:
                      type: string
                      description: Upload UUID
                    url:
                      type: string
                      description: Full size file URL
                    thumb_url:
                      type: string
                      nullable: true
                      description: Thumbnail URL (images only)
                    medium_url:
                      type: string
                      nullable: true
                      description: Medium size URL (images only)
                    favicon_url:
                      type: string
                      nullable: true
                      description: Favicon URL (32x32 ICO, logos only)
                    media_type:
                      type: string
                      enum:
                        - image
                        - video
                        - document
                      description: Media type
                    is_logo:
                      type: boolean
                      description: Whether this upload is a logo
                    filename:
                      type: string
                      description: Original filename
                    created_at:
                      type: string
                      format: date-time
                      description: Creation timestamp
                    updated_at:
                      type: string
                      format: date-time
                      description: Last update timestamp
                  required:
                    - id
                    - uuid
                    - url
                    - media_type
                    - is_logo
                    - filename
                    - created_at
                    - updated_at
        "404":
          description: website not found when filtering
