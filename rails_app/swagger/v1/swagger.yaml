                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
    patch:
      summary: Updates a brainstorm
      tags:
      - Brainstorms
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: brainstorm updated in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Brainstorm name
                  thread_id:
                    type: string
                    format: uuid
                    description: UUID identifier
                  account_id:
                    type: integer
                    description: Unique identifier
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - thread_id
                - account_id
                - website_id
                - project_id
                - name
                - created_at
                - updated_at
        '404':
          description: brainstorm not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                brainstorm:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Optional name for the brainstorm. Defaults to MM/DD/YYYY
                        HH:MM:SS
                    thread_id:
                      type: string
                      description: Required thread ID from Langgraph
                    idea:
                      type: string
                      description: The core idea for the landing page
                    audience:
                      type: string
                      description: Target audience for the landing page
                    solution:
                      type: string
                      description: The solution being offered
                    social_proof:
                      type: string
                      description: Social proof elements
                    look_and_feel:
                      type: string
                      description: Design preferences
                    project_attributes:
                      type: object
                      properties:
                        uuid:
                          type: string
                          description: Optional UUID for the project
              required:
              - brainstorm
  "/api/v1/campaigns":
    post:
      summary: Creates a campaign
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: campaign created without website_id (falls back to project
            website)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  thread_id:
                    type: string
                    description: Thread ID for campaign
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  ready_for_next_stage:
                    type: boolean
                    description: Whether campaign is ready to advance to next stage
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  google_advertising_channel_type:
                    type: string
                    nullable: true
                    description: Google Ads channel type
                  google_bidding_strategy:
                    type: string
                    nullable: true
                    description: Google Ads bidding strategy
                  ad_groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        name:
                          type: string
                        ads:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Unique identifier
                              headlines:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: integer
                                      description: Unique identifier
                                    text:
                                      type: string
                              descriptions:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    text:
                                      type: string
                        keywords:
                          type: array
                          items:
                            type: object
                            properties:
                              text:
                                type: string
                              match_type:
                                type: string
                  callouts:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                  structured_snippet:
                    type: object
                    nullable: true
                    properties:
                      category:
                        type: string
                      values:
                        type: array
                        items:
                          type: string
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '200':
          description: campaign already exists and is returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  thread_id:
                    type: string
                    description: Thread ID for campaign
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  ready_for_next_stage:
                    type: boolean
                    description: Whether campaign is ready to advance to next stage
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  google_advertising_channel_type:
                    type: string
                    nullable: true
                    description: Google Ads channel type
                  google_bidding_strategy:
                    type: string
                    nullable: true
                    description: Google Ads bidding strategy
                  ad_groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        name:
                          type: string
                        ads:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Unique identifier
                              headlines:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: integer
                                      description: Unique identifier
                                    text:
                                      type: string
                              descriptions:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    text:
                                      type: string
                        keywords:
                          type: array
                          items:
                            type: object
                            properties:
                              text:
                                type: string
                              match_type:
                                type: string
                  callouts:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                  structured_snippet:
                    type: object
                    nullable: true
                    properties:
                      category:
                        type: string
                      values:
                        type: array
                        items:
                          type: string
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '401':
          description: unauthorized - missing token
        '422':
          description: invalid request - missing thread_id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                    - type: array
                      items:
                        type: string
                      description: Array of error messages
                    - type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      description: Object with field paths as keys and arrays of error
                        messages as values
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Campaign name
                    project_id:
                      type: integer
                      description: Project ID
                    website_id:
                      type: integer
                      description: Website ID
                    thread_id:
                      type: string
                      description: Thread ID
                  required:
                  - project_id
                  - thread_id
              required:
              - campaign
  "/api/v1/campaigns/{id}":
    parameters:
    - name: id
      in: path
      description: Campaign ID
      required: true
      schema:
        type: integer
    patch:
      summary: Validates campaign updates
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: preserves all previous stage content when updating launch settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  name:
                    type: string
                    description: Campaign name
                  thread_id:
                    type: string
                    description: Thread ID for campaign
                  stage:
                    type: string
                    description: Current campaign stage
                  status:
                    type: string
                    description: Campaign status
                  ready_for_next_stage:
                    type: boolean
                    description: Whether campaign is ready to advance to next stage
                  account_id:
                    type: integer
                    description: Unique identifier
                  project_id:
                    type: integer
                    description: Unique identifier
                  website_id:
                    type: integer
                    description: Unique identifier
                  start_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign start date
                  end_date:
                    type: string
                    format: date
                    nullable: true
                    description: Campaign end date
                  time_zone:
                    type: string
                    description: Campaign time zone
                  daily_budget_cents:
                    type: integer
                    nullable: true
                    description: Daily budget in cents
                  google_advertising_channel_type:
                    type: string
                    nullable: true
                    description: Google Ads channel type
                  google_bidding_strategy:
                    type: string
                    nullable: true
                    description: Google Ads bidding strategy
                  ad_groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        name:
                          type: string
                        ads:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Unique identifier
                              headlines:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: integer
                                      description: Unique identifier
                                    text:
                                      type: string
                              descriptions:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    text:
                                      type: string
                        keywords:
                          type: array
                          items:
                            type: object
                            properties:
                              text:
                                type: string
                              match_type:
                                type: string
                  callouts:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                  structured_snippet:
                    type: object
                    nullable: true
                    properties:
                      category:
                        type: string
                      values:
                        type: array
                        items:
                          type: string
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
                - account_id
                - project_id
                - website_id
                - created_at
                - updated_at
        '404':
          description: campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                    - type: array
                      items:
                        type: string
                      description: Array of error messages
                    - type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      description: Object with field paths as keys and arrays of error
                        messages as values
        '422':
          description: does not save any changes when validation fails
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                    - type: array
                      items:
                        type: string
                      description: Array of error messages
                    - type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      description: Object with field paths as keys and arrays of error
                        messages as values
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Campaign name
                start_date:
                  type: string
                  format: date
                  description: Campaign start date
                end_date:
                  type: string
                  format: date
                  description: Campaign end date
                time_zone:
                  type: string
                  description: Campaign time zone
                daily_budget_cents:
                  type: integer
                  description: Daily budget in cents
                google_advertising_channel_type:
                  type: string
                  description: Google Ads channel type
                google_bidding_strategy:
                  type: string
                  description: Google Ads bidding strategy
                ad_group:
                  type: object
                  description: Flat ad group attributes for single ad group campaigns
                  properties:
                    name:
                      type: string
                headlines:
                  type: array
                  description: Flat headlines array (applied to first ad in first
                    ad group)
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      text:
                        type: string
                descriptions:
                  type: array
                  description: Flat descriptions array (applied to first ad in first
                    ad group)
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      text:
                        type: string
                keywords:
                  type: array
                  description: Flat keywords array (applied to first ad group)
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      text:
                        type: string
                      match_type:
                        type: string
                callouts:
                  type: array
                  description: Campaign callout extensions
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      text:
                        type: string
                structured_snippet:
                  type: object
                  description: Campaign structured snippet extension
                  properties:
                    category:
                      type: string
                    values:
                      type: array
                      items:
                        type: string
                    _destroy:
                      type: boolean
                location_targets:
                  type: array
                  items:
                    type: object
                    properties:
                      target_type:
                        type: string
                      location_name:
                        type: string
                      location_type:
                        type: string
                      country_code:
                        type: string
                      targeted:
                        type: boolean
                      google_criterion_id:
                        type: string
                      radius:
                        type: number
                      radius_units:
                        type: string
                ad_schedules:
                  type: object
                  properties:
                    always_on:
                      type: boolean
                      description: Whether the campaign runs 24/7
                    start_time:
                      type: string
                      description: Start time in format like "9:00am"
                      example: 9:00am
                    end_time:
                      type: string
                      description: End time in format like "5:00pm"
                      example: 5:00pm
                    time_zone:
                      type: string
                      description: IANA time zone
                      example: America/New_York
                    day_of_week:
                      type: array
                      items:
                        type: string
                      description: Days when ads should run
                      example:
                      - Monday
                      - Tuesday
                      - Wednesday
  "/api/v1/campaigns/{id}/advance":
    parameters:
    - name: id
      in: path
      description: Campaign ID
      required: true
      schema:
        type: integer
    post:
      summary: Advances campaign to next stage
      tags:
      - Campaigns
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: X-Signature
        in: header
        required: false
        schema:
          type: string
      - name: X-Timestamp
        in: header
        required: false
        schema:
          type: string
      responses:
        '404':
          description: campaign not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                    - type: array
                      items:
                        type: string
                      description: Array of error messages
                    - type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      description: Object with field paths as keys and arrays of error
                        messages as values
        '200':
          description: campaign advanced from launch to review stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  stage:
                    type: string
                    description: New campaign stage after advancement
                  status:
                    type: string
                    description: Campaign status
                  workflow:
                    type: object
                    nullable: true
                    properties:
                      step:
                        type: string
                      substep:
                        type: string
                        nullable: true
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                - id
                - stage
                - status
        '422':
          description: cannot advance from launch - validation failed (missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                    - type: array
                      items:
                        type: string
                      description: Array of error messages
                    - type: object
                      additionalProperties:
                        type: array
                        items:
                          type: string
                      description: Object with field paths as keys and arrays of error
                        messages as values
