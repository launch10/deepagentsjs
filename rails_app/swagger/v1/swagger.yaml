  "/api/v1/leads":
    post:
      summary: Creates a lead signup from a deployed landing page
      tags:
        - Leads
      description: |
        Public endpoint for landing pages to submit email signups.
        This endpoint is called from deployed landing pages and uses a signed token
        for authentication instead of JWT/session auth.

        **Authentication:**
        - Token passed as query parameter `token`
        - Token is a Rails signup_token generated from the project
        - Token is purpose-scoped to :lead_signup

        **Processing:**
        - Returns 202 Accepted immediately
        - Lead creation happens asynchronously via background job
        - Email validation happens synchronously (422 returned for invalid emails)

        **CORS:**
        - Allows requests from any origin
        - Only Content-Type header allowed
        - No credentials/cookies sent
      parameters:
        - name: token
          in: query
          schema:
            type: string
            description: |-
              Signed ID token that authenticates the request and identifies the project.
              Generated via Project#signed_id(purpose: :lead_signup).
              This token is embedded in deployed landing pages at build time.
          required: true
          description: Signed ID token authenticating the request
        - name: Origin
          in: header
          required: false
          description: Origin of the request (for future CSRF protection via origin
            validation)
          schema:
            type: string
      responses:
        "202":
          description: accepts requests with custom domain Origin
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates the lead was successfully created or updated
                required:
                  - success
        "401":
          description: deleted project returns unauthorized (no information leakage)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Authentication error message (e.g., "Invalid token")
                required:
                  - error
        "422":
          description: name too long returns validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    description: Validation error messages keyed by field name
                required:
                  - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: Email address for the lead signup (required)
                name:
                  type: string
                  maxLength: 255
                  nullable: true
                  description: Optional name of the person signing up
              required:
                - email
        description: Lead signup data
  "/api/v1/model_configuration":
    get:
      summary: Retrieves model configuration
      tags:
        - Model Configuration
      description: Returns all model configurations and preferences. Used by Langgraph
        to fetch LLM settings.
      parameters:
        - name: X-Signature
          in: header
          required: true
          description: HMAC signature for internal API authentication
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          description: Unix timestamp for signature verification
          schema:
            type: string
      responses:
        "200":
          description: model configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: object
                    description: Map of model_key to model configuration
                    additionalProperties:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          description: Whether this model is enabled
                        max_usage_percent:
                          type: integer
                          nullable: true
                          description: Maximum usage percentage for this model
                        cost_in:
                          type: number
                          nullable: true
                          description: Cost per million input tokens in dollars
                        cost_out:
                          type: number
                          nullable: true
                          description: Cost per million output tokens in dollars
                        cost_reasoning:
                          type: number
                          nullable: true
                          description: Cost per million reasoning tokens in dollars
                        cache_reads:
                          type: number
                          nullable: true
                          description: Cost per million cache read tokens in dollars
                        cache_writes:
                          type: number
                          nullable: true
                          description: Cost per million cache write tokens in dollars
                        model_card:
                          type: string
                          nullable: true
                          description: Model card identifier (e.g., claude-sonnet-4-5-20250220)
                        provider:
                          type: string
                          nullable: true
                          description: LLM provider (anthropic, openai, groq, ollama)
                        price_tier:
                          type: integer
                          description: Price tier (1=premium, 5=cheap) based on weighted
                            effective cost
                      required:
                        - enabled
                        - price_tier
                  preferences:
                    type: object
                    description: Nested map of cost_tier -> speed_tier -> skill ->
                      model_keys array
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
                  updated_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: Most recent update timestamp across all configs
                required:
                  - models
                  - preferences
        "401":
