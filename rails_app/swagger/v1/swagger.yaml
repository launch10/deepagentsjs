---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/agent_context_events":
    get:
      summary: Lists context events for a project
      tags:
        - Agent Context Events
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
        - name: project_id
          in: query
          required: true
          description: Project ID to fetch events for
          schema:
            type: integer
        - name: event_types[]
          in: query
          items:
            type: string
          required: false
          description: Filter by event types
          schema:
            type: array
        - name: since
          in: query
          format: date-time
          required: false
          description: ISO8601 timestamp to filter events after
          schema:
            type: string
      responses:
        "200":
          description: includes event payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Unique identifier
                    event_type:
                      type: string
                      description: Type of the context event
                    payload:
                      type: object
                      additionalProperties: true
                      description: Event payload data
                    created_at:
                      type: string
                      format: date-time
                      description: Timestamp
                  required:
                    - id
                    - event_type
                    - payload
                    - created_at
        "400":
          description: missing project_id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Single error message
                  errors:
                    oneOf:
                      - type: array
                        items:
                          type: string
                        description: Array of error messages
                      - type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
                        description: Object with field paths as keys and arrays of error
                          messages as values
        "404":
          description: cannot access another account's project
        "401":
          description: unauthorized - invalid token
  "/api/v1/app_events":
    post:
      summary: Creates an internal app event
      tags:
        - App Events
      parameters:
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "202":
          description: event accepted without optional fields
        "422":
          description: rejects missing event_name
        "401":
          description: unauthorized - missing signature
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event_name:
                  type: string
                  description: Name of the event to track
                user_id:
                  type: integer
                  description: User ID
                  nullable: true
                project_id:
                  type: integer
                  description: Project ID
                  nullable: true
                properties:
                  type: object
                  additionalProperties: true
                  description: Additional event properties
                  nullable: true
              required:
                - event_name
  "/api/v1/credits/check":
    get:
      summary: Checks account credit balance
      tags:
        - Credits
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: returns breakdown of plan and pack credits
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: Whether the account can proceed (has positive balance)
                  balance_millicredits:
                    type: integer
                    description: Total balance in millicredits
                  plan_millicredits:
                    type: integer
                    description: Plan credits in millicredits (expire at renewal)
                  pack_millicredits:
                    type: integer
                    description: Pack credits in millicredits (persist until used)
                required:
                  - ok
                  - balance_millicredits
                  - plan_millicredits
                  - pack_millicredits
        "401":
          description: unauthorized - expired token
  "/api/v1/websites/{website_id}/domain_context":
    get:
      summary: Returns domain context for subdomain picker
      tags:
        - Websites
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
        - name: website_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: scopes domains to user's account only
          content:
            application/json:
              schema:
                type: object
                properties:
                  existing_domains:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        domain:
                          type: string
                          description: Domain name
                        is_platform_subdomain:
                          type: boolean
                          description: Whether this is a platform subdomain
                        website_urls:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Unique identifier
                              path:
                                type: string
                                description: URL path
                              website_id:
                                type: integer
                                description: Website ID
                            required:
                              - id
                              - path
                              - website_id
                          description: URLs associated with this domain
                        dns_verification_status:
                          type: string
                          nullable: true
                          enum:
                            - pending
                            - verified
                            - failed
                            -
                          description: DNS verification status for custom domains
                        created_at:
                          type: string
                          format: date-time
                          description: Creation timestamp
                      required:
                        - id
                        - domain
                        - is_platform_subdomain
                        - created_at
                    description: All domains belonging to the account
                  platform_subdomain_credits:
                    type: object
                    properties:
                      limit:
                        type: integer
                        description: Maximum platform subdomains allowed
                      used:
                        type: integer
                        description: Number of platform subdomains used
                      remaining:
                        type: integer
                        description: Remaining platform subdomains
                    required:
                      - limit
                      - used
                      - remaining
                  brainstorm_context:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                        description: Unique identifier
                      idea:
                        type: string
                        nullable: true
                        description: The core idea for the landing page
                      audience:
                        type: string
                        nullable: true
                        description: Target audience for the landing page
                      solution:
                        type: string
                        nullable: true
                        description: The solution being offered
                      social_proof:
                        type: string
                        nullable: true
                        description: Social proof elements
                    required:
                      - id
                  plan_tier:
                    type: string
                    nullable: true
                    description: User plan tier (starter, growth, pro)
                required:
                  - existing_domains
                  - platform_subdomain_credits
        "404":
          description: returns not found when website belongs to different account
        "401":
          description: unauthorized - invalid token
  "/api/v1/domains":
    get:
      summary: Lists domains for the account
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: returns domains for team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        domain:
                          type: string
                          description: Domain name
                        account_id:
                          type: integer
                          description: Unique identifier
                        is_platform_subdomain:
                          type: boolean
                          description: Whether this is a platform subdomain
                        cloudflare_zone_id:
                          type: string
                          nullable: true
                          description: Cloudflare zone ID
                        dns_verification_status:
                          type: string
                          nullable: true
                          description: DNS verification status
                        dns_last_checked_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Last DNS check timestamp
                        dns_error_message:
                          type: string
                          nullable: true
                          description: DNS error message
                        website_urls:
                          type: array
                          nullable: true
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                description: Unique identifier
                              path:
                                type: string
                                description: URL path
                              website_id:
                                type: integer
                                description: Website ID
                            required:
                              - id
                              - path
                              - website_id
                          description: URLs associated with this domain (only included
                            when include_website_urls=true)
                        created_at:
                          type: string
                          format: date-time
                          description: Timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Timestamp
                      required:
                        - id
                        - domain
                        - account_id
                        - is_platform_subdomain
                        - created_at
                        - updated_at
                  platform_subdomain_credits:
                    type: object
                    properties:
                      limit:
                        type: integer
                        description: Maximum platform subdomains allowed
                      used:
                        type: integer
                        description: Number of platform subdomains used
                      remaining:
                        type: integer
                        description: Remaining platform subdomains
                    required:
                      - limit
                      - used
                      - remaining
                  plan_tier:
                    type: string
                    nullable: true
                    description: User plan tier (starter, growth, pro)
                required:
                  - domains
                  - platform_subdomain_credits
        "401":
          description: unauthorized - missing token
    post:
      summary: Creates a domain
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "201":
          description: domain created in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Unique identifier
                      domain:
                        type: string
                        description: Domain name
                      account_id:
                        type: integer
                        description: Unique identifier
                      is_platform_subdomain:
                        type: boolean
                        description: Whether this is a platform subdomain
                      cloudflare_zone_id:
                        type: string
                        nullable: true
                        description: Cloudflare zone ID
                      dns_verification_status:
                        type: string
                        nullable: true
                        description: DNS verification status
                      dns_last_checked_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: Last DNS check timestamp
                      dns_error_message:
                        type: string
                        nullable: true
                        description: DNS error message
                      website_urls:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              description: Unique identifier
                            path:
                              type: string
                              description: URL path
                            website_id:
                              type: integer
                              description: Website ID
                          required:
                            - id
                            - path
                            - website_id
                        description: URLs associated with this domain (only included
                          when include_website_urls=true)
                      created_at:
                        type: string
                        format: date-time
                        description: Timestamp
                      updated_at:
                        type: string
                        format: date-time
                        description: Timestamp
                    required:
                      - id
                      - domain
                      - account_id
                      - is_platform_subdomain
                      - created_at
                      - updated_at
                  website_url:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Unique identifier
                      path:
                        type: string
                        description: URL path
                      account_id:
                        type: integer
                        description: Unique identifier
                      website_id:
                        type: integer
                        description: Unique identifier
                      domain_id:
                        type: integer
                        description: Unique identifier
                      domain_string:
                        type: string
                        nullable: true
                        description: Domain name
                      created_at:
                        type: string
                        format: date-time
                        description: Timestamp
                      updated_at:
                        type: string
                        format: date-time
                        description: Timestamp
                    required:
                      - id
                      - path
                      - account_id
                      - website_id
                      - domain_id
                      - created_at
                      - updated_at
                  platform_subdomain_credits:
                    type: object
                    properties:
                      limit:
                        type: integer
                        description: Maximum platform subdomains allowed
                      used:
                        type: integer
                        description: Number of platform subdomains used
                      remaining:
                        type: integer
                        description: Remaining platform subdomains
                    required:
                      - limit
                      - used
                      - remaining
                required:
                  - domain
                  - website_url
                  - platform_subdomain_credits
        "422":
          description: subdomain limit exceeded
        "401":
          description: unauthorized - missing token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: object
                  properties:
                    domain:
                      type: string
                      description: Domain name
                    website_id:
                      type: integer
                      description: Associated website ID
                    is_platform_subdomain:
                      type: boolean
                      description: Whether this is a platform subdomain
              required:
                - domain
  "/api/v1/domains/search":
    post:
      summary: Searches for domain availability
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: normalizes domain inputs
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        domain:
                          type: string
                          description: Domain name
                        status:
                          type: string
                          enum:
                            - existing
                            - unavailable
                            - available
                          description: Availability status
                        existing_id:
                          type: integer
                          nullable: true
                          description: ID of existing domain if owned by current account
                      required:
                        - domain
                        - status
                  platform_subdomain_credits:
                    type: object
                    properties:
                      limit:
                        type: integer
                        description: Maximum platform subdomains allowed
                      used:
                        type: integer
                        description: Number of platform subdomains used
                      remaining:
                        type: integer
                        description: Remaining platform subdomains
                    required:
                      - limit
                      - used
                      - remaining
                required:
                  - results
                  - platform_subdomain_credits
        "422":
          description: exceeds maximum candidates
        "401":
          description: unauthorized - missing token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                candidates:
                  type: array
                  items:
                    type: string
                  description: Array of domain names to check availability (max 10)
              required:
                - candidates
  "/api/v1/domains/{id}":
    patch:
      summary: Updates domain DNS verification status
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: successfully updates dns_verification_status
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  domain:
                    type: string
                    description: Domain name
                  account_id:
                    type: integer
                    description: Unique identifier
                  is_platform_subdomain:
                    type: boolean
                    description: Whether this is a platform subdomain
                  cloudflare_zone_id:
                    type: string
                    nullable: true
                    description: Cloudflare zone ID
                  dns_verification_status:
                    type: string
                    nullable: true
                    description: DNS verification status
                  dns_last_checked_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: Last DNS check timestamp
                  dns_error_message:
                    type: string
                    nullable: true
                    description: DNS error message
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                  - id
                  - domain
                  - account_id
                  - is_platform_subdomain
                  - created_at
                  - updated_at
        "404":
          description: returns not found for non-existent domain
        "401":
          description: unauthorized - missing token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: object
                  properties:
                    dns_verification_status:
                      type: string
    parameters:
      - name: id
        in: path
        description: Domain ID
        required: true
        schema:
          type: integer
    get:
      summary: Retrieves a domain
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: domain found in team account after switching
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique identifier
                  domain:
                    type: string
                    description: Domain name
                  account_id:
                    type: integer
                    description: Unique identifier
                  is_platform_subdomain:
                    type: boolean
                    description: Whether this is a platform subdomain
                  cloudflare_zone_id:
                    type: string
                    nullable: true
                    description: Cloudflare zone ID
                  dns_verification_status:
                    type: string
                    nullable: true
                    description: DNS verification status
                  dns_last_checked_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: Last DNS check timestamp
                  dns_error_message:
                    type: string
                    nullable: true
                    description: DNS error message
                  website_urls:
                    type: array
                    nullable: true
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        path:
                          type: string
                          description: URL path
                        website_id:
                          type: integer
                          description: Website ID
                      required:
                        - id
                        - path
                        - website_id
                    description: URLs associated with this domain (only included when
                      include_website_urls=true)
                  created_at:
                    type: string
                    format: date-time
                    description: Timestamp
                  updated_at:
                    type: string
                    format: date-time
                    description: Timestamp
                required:
                  - id
                  - domain
                  - account_id
                  - is_platform_subdomain
                  - created_at
                  - updated_at
        "404":
          description: cannot access other user domain
  "/api/v1/domains/{id}/verify_dns":
    post:
      summary: Verifies DNS configuration for a custom domain
      tags:
        - Domains
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: returns pending status when CNAME not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain_id:
                    type: integer
                    description: Unique identifier
                  domain:
                    type: string
                    description: Domain name
                  verification_status:
                    type: string
                    enum:
                      - pending
                      - verified
                      - failed
                    description: DNS verification status
                  expected_cname:
                    type: string
                    nullable: true
                    description: Expected CNAME target
                  actual_cname:
                    type: string
                    nullable: true
                    description: Actual CNAME found
                  last_checked_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: Last DNS check timestamp
                  error_message:
                    type: string
                    nullable: true
                    description: Error message if verification failed
                required:
                  - domain_id
                  - domain
                  - verification_status
        "404":
          description: returns not found for domain belonging to another account
        "401":
          description: unauthorized - missing token
  "/api/v1/projects":
    get:
      summary: Lists paginated projects
      tags:
        - Projects
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number (default 1)
          schema:
            type: integer
        - name: status
          in: query
          required: false
          description: Filter by status (draft, paused, live)
          schema:
            type: string
      responses:
        "200":
          description: returns project mini JSON with expected fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique identifier
                        uuid:
                          type: string
                          format: uuid
                          description: UUID identifier
                        website_id:
                          type:
                            - integer
                            - "null"
                          description: Associated website ID
                        account_id:
                          type: integer
                          description: Unique identifier
                        name:
                          type: string
                          description: Project name
                        status:
                          type: string
                          enum:
                            - draft
                            - paused
                            - live
                          description: Project status
                        domain:
                          type:
                            - string
                            - "null"
                          description: Primary domain
                        created_at:
                          type: string
                          format: date-time
                          description: Timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Timestamp
                      required:
                        - id
                        - uuid
                        - account_id
                        - name
                        - status
                        - created_at
                        - updated_at
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        description: Current page number
                      total_pages:
                        type: integer
                        description: Total number of pages
                      total_count:
                        type: integer
                        description: Total number of items
                      prev_page:
                        type:
                          - integer
                          - "null"
                        description: Previous page number or null
                      next_page:
                        type:
                          - integer
                          - "null"
                        description: Next page number or null
                      from:
                        type:
                          - integer
                          - "null"
                        description: First item index on current page
                      to:
                        type:
                          - integer
                          - "null"
                        description: Last item index on current page
                      series:
                        type: array
                        items:
                          oneOf:
                            - type: integer
                            - type: string
                        description: Page series for pagination controls
                    required:
                      - current_page
                      - total_pages
                      - total_count
                  status_counts:
                    type: object
                    properties:
                      draft:
                        type: integer
                        description: Number of draft projects
                      paused:
                        type: integer
                        description: Number of paused projects
                      live:
                        type: integer
                        description: Number of live projects
                required:
                  - projects
                  - pagination
                  - status_counts
        "401":
          description: unauthorized - expired token
  "/api/v1/projects/{uuid}":
    delete:
      summary: Deletes a project
      tags:
        - Projects
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
