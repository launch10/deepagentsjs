  "/api/v1/dashboard_insights":
    get:
      summary: Retrieves current dashboard insights
      tags:
        - Dashboard Insights
      security:
        - bearer_auth: []
      parameters:
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: returns stale insights with fresh=false
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    oneOf:
                      - type: integer
                        description: Unique identifier
                      - type: "null"
                    description: Insight record ID (null if none exists)
                  insights:
                    oneOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                              description: Short title (5 words max)
                            description:
                              type: string
                              description: 2-3 sentence explanation with specific numbers
                            sentiment:
                              type: string
                              enum:
                                - positive
                                - negative
                                - neutral
                              description: Sentiment of the insight
                            project_uuid:
                              type: string
                              nullable: true
                              description: Project UUID if project-specific, null if
                                account-wide
                            action:
                              type: object
                              properties:
                                label:
                                  type: string
                                  description: Button text
                                url:
                                  type: string
                                  description: Action URL path
                              required:
                                - label
                                - url
                          required:
                            - title
                            - description
                            - sentiment
                            - action
                      - type: "null"
                    description: Array of 3 insights (null if none exists)
                  generated_at:
                    oneOf:
                      - type: string
                        format: date-time
                        description: Timestamp
                      - type: "null"
                    description: When insights were generated (null if none exists)
                  fresh:
                    type: boolean
                    description: Whether insights are still fresh (< 24 hours old)
                  metrics_summary:
                    oneOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
                    description: The metrics used to generate insights
                required:
                  - id
                  - insights
                  - generated_at
                  - fresh
