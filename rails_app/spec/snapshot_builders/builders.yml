core_data:
  class: CoreData
  description: "Seeds plans, templates, themes, and faqs"

geo_target_constants:
  class: Core::GeoTargetConstants
  description: "Seeds Google Ads geo target constants (228k locations)"

basic_account:
  class: BasicAccount
  base_snapshot: core_data
  description: "Creates a subscribed test user account"

non_subscribed_account:
  class: NonSubscribedAccount
  base_snapshot: core_data
  description: "Creates a test user without a subscription"

brainstorm_step:
  class: BrainstormStep
  base_snapshot: basic_account
  description: "Creates a brainstorm project"

website_step:
  class: WebsiteStep
  base_snapshot: basic_account
  description: "Creates a website with brainstorm, theme, and uploads - template state only (no generated content)"

website_generated:
  class: WebsiteGenerated
  base_snapshot: website_step
  description: "Website with generated scheduling-tool landing page content (Hero, Features, etc.)"

domain_step:
  class: DomainStep
  base_snapshot: website_generated
  description: "Website with domain and URL assigned"

website_deploy_step:
  class: WebsiteDeployStep
  base_snapshot: domain_step
  description: "Completed website deploy with all tasks finished and deploy checkpoint seeded"

website_step_finished:
  class: WebsiteStepFinished
  base_snapshot: website_step
  description: "Finishes website step and advances workflow to ad_campaign:content"

website_with_import_errors:
  class: WebsiteWithImportErrors
  base_snapshot: website_step_finished
  description: "Website with import errors for deploy validation testing"

website_with_broken_links:
  class: WebsiteWithBrokenLinks
  base_snapshot: website_step_finished
  description: "Website with broken anchor links for deploy validation testing"

campaign_content_step:
  class: CampaignContentStep
  base_snapshot: website_step_finished
  description: "Campaign content step with headlines and descriptions"

campaign_highlights_step:
  class: CampaignHighlightsStep
  base_snapshot: campaign_content_step
  description: "Campaign highlights step with callouts and snippets"

campaign_keywords_step:
  class: CampaignKeywordsStep
  base_snapshot: campaign_highlights_step
  description: "Campaign keywords step with ad groups and keywords"

campaign_settings_step:
  class: CampaignSettingsStep
  base_snapshot: campaign_keywords_step
  description: "Campaign settings step with budget, geo targets, and schedules"

campaign_launch_step:
  class: CampaignLaunchStep
  base_snapshot: campaign_settings_step
  description: "Campaign launch step ready for review"

campaign_review_step:
  class: CampaignReviewStep
  base_snapshot: campaign_launch_step
  description: "Campaign review step ready for deployment"

campaign_complete:
  class: CampaignComplete
  base_snapshot: campaign_review_step
  description: "Creates a complete campaign with favicon, budget, geo targets, schedules, headlines, descriptions, callouts, snippets, ad groups, and keywords"

deploy_step:
  class: DeployStep
  base_snapshot: campaign_review_step
  description: "Ready for deploy with Google OAuth connected and pending deploy created"

website_deployed:
  class: WebsiteDeployed
  base_snapshot: deploy_step
  description: "Fully deployed website with 25 leads for testing (pagination: 20 per page)"

campaign_with_metrics:
  class: CampaignWithMetrics
  base_snapshot: website_deployed
  description: "Analytics dashboard with 4 projects, 30 days metrics, ad performance, and insights"

# Analytics snapshots - run actual services to compute metrics
# Use these for dashboard testing and Langgraph insights tests

analytics/healthy_account:
  class: SnapshotBuilders::Analytics::HealthyAccount
  base_snapshot: website_deployed
  description: "3 healthy projects with ~47 leads, positive trends, good CTR/CPL"

analytics/struggling_account:
  class: SnapshotBuilders::Analytics::StrugglingAccount
  base_snapshot: website_deployed
  description: "1 project with 0 leads, $320 spent, declining metrics"

analytics/stalled_project:
  class: SnapshotBuilders::Analytics::StalledProject
  base_snapshot: website_deployed
  description: "3 projects, 1 stalled (no leads in 14+ days)"

analytics/new_account:
  class: SnapshotBuilders::Analytics::NewAccount
  base_snapshot: website_deployed
  description: "1 project just launched, only 3 days of data"

analytics/empty_account:
  class: SnapshotBuilders::Analytics::EmptyAccount
  base_snapshot: basic_account
  description: "Subscribed account with 0 projects - tests 'Deploy Your First Project' insights"

# Projects page snapshots - for projects list e2e tests
# Use these for pagination, filtering, and deletion tests
# Note: Empty state uses analytics/empty_account, single project uses website_deployed

projects/mixed_statuses:
  class: SnapshotBuilders::Projects::MixedStatuses
  base_snapshot: basic_account
  description: "4 projects (2 live, 1 paused, 1 draft) - tests status filtering"

projects/multiple_pages:
  class: SnapshotBuilders::Projects::MultiplePages
  base_snapshot: basic_account
  description: "8 projects (4 live, 2 paused, 2 draft) - tests pagination (5 per page = 2 pages)"
