worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream for Rails app
    upstream rails_app {
        server rails_app:3000; # Docker service name and port
    }

    # Upstream for Langgraph app
    upstream langgraph_server {
        server langgraph_app:4000; # Docker service name and port
    }

    server {
        listen 80;
        server_name localhost; # Or your domain

        # Location for the authentication subrequest
        location = /_auth_verify {
            internal; # Crucial: Makes this location only accessible by Nginx subrequests

            proxy_pass http://rails_app/auth/verify; # To our Rails auth endpoint
            proxy_pass_request_body off; # Don't send body to auth request (usually GET)
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri; # Pass original URI
            proxy_set_header X-Original-Method $request_method; # Pass original method
            proxy_set_header Host $http_host; # Pass original host
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass original cookies to Rails for session-based auth
            proxy_set_header Cookie $http_cookie;
            # If using Authorization header (e.g., JWT), pass it too
            proxy_set_header Authorization $http_authorization;

            # Custom header to let Rails know this is an auth request
            proxy_set_header X-Auth-Request "true";
        }

        # Location for the Langgraph streaming service
        location /langgraph/stream {
            auth_request /_auth_verify; # Perform auth check before proxying

            # If auth is successful, Nginx gets 2xx from /_auth_verify
            # If auth fails, Nginx gets 401/403 and returns that to client

            # Capture headers from auth response (if Rails sets them)
            auth_request_set $auth_user_id $upstream_http_x_authenticated_user_id;
            auth_request_set $auth_user_email $upstream_http_x_authenticated_user_email;

            # Proxy to Langgraph
            proxy_pass http://langgraph_server/stream; # Match Langgraph's endpoint

            # Headers for streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; # For WebSockets, if Langgraph uses them
            proxy_set_header Connection "keep-alive"; # For HTTP/1.1 keep-alive and streaming
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass captured auth headers to Langgraph
            proxy_set_header X-Authenticated-User-Id $auth_user_id;
            proxy_set_header X-Authenticated-User-Email $auth_user_email;

            # Crucial for streaming: disable buffering
            proxy_buffering off;
            proxy_request_buffering off; # Usually good to turn off for streaming as well
            proxy_read_timeout 3600s; # Or some long timeout
            proxy_send_timeout 3600s;

            # If Langgraph uses Server-Sent Events (SSE), Nginx needs to handle it right
            # The 'X-Accel-Buffering: no' header from upstream also helps.
            # For SSE, ensure Content-Type text/event-stream is passed.
            # proxy_set_header Accept "text/event-stream"; # Not always necessary, client usually sets
        }

        # General Rails application access (login, other pages)
        location / {
            proxy_pass http://rails_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}