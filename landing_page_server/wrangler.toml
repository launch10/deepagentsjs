# wrangler.toml
name = "landing-page-server"
main = "src/index.tsx"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "USER_PAGES"
bucket_name = "user-pages"
preview_bucket_name = "user-pages"

[[kv_namespaces]]
binding = "USAGE_LIMIT"
id = "user-usage-limit"
preview_id = "user-usage-limit"

[durable_objects]
bindings = [{ name = "RATE_LIMITER", class_name = "RateLimiterDO" }]

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

# Cron trigger to run the reset job every day at midnight UTC.
[triggers]
crons = ["0 0 * * *"]