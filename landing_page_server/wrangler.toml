# wrangler.toml
name = "landing-page-server"
main = "src/index.tsx"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "DEPLOYS_R2"
bucket_name = "deploys"
preview_bucket_name = "deploys"

[[kv_namespaces]]
binding = "DEPLOYS_KV"
id = "deploys"

[durable_objects]
bindings = [{ name = "FIREWALL", class_name = "FirewallDO" }]

[[migrations]]
tag = "v1"
new_classes = ["FirewallDO"]

# Cron trigger to run the reset job every day at midnight UTC.
[triggers]
crons = ["0 0 * * *"]