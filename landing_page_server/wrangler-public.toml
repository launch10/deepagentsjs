# Public-facing worker configuration
name = "landing-page-server"
main = "src/index-public.tsx"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "DEPLOYS_R2"
bucket_name = "deploys"

[[kv_namespaces]]
binding = "DEPLOYS_KV"
id = "deploys"

[durable_objects]
bindings = [{ name = "FIREWALL", class_name = "FirewallDO" }]